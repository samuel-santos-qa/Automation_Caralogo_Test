name: Cucumber API Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  workflow_dispatch:

permissions:
  contents: read

jobs:
  cucumber:
    name: Run Cucumber tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        shell: pwsh
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Run Cucumber tests
        shell: pwsh
        run: |
          bundle exec cucumber

  auto_review:
    name: Auto review pull request
    needs: cucumber
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_URL: ${{ github.event.pull_request.html_url }}

    steps:
      - name: Approve pull request when Cucumber passes
        if: ${{ needs.cucumber.result == 'success' }}
        run: |
          gh pr review "$PR_URL" --approve --body "✅ Cucumber tests passed. Pull request approved automatically."

      - name: Request changes when Cucumber fails
        if: ${{ needs.cucumber.result != 'success' }}
        run: |
          gh pr review "$PR_URL" --request-changes --body "❌ Cucumber tests did not pass. Please check the GitHub Actions logs before merging."
